name: Electron Release (Windows) 🪟🚀

# Modeled after the Lemonade SDK release pattern:
# - Self-hosted Windows runner for builds
# - Process cleanup before/after
# - Artifact upload + GitHub Release creation

on:
  push:
    tags:
      - 'v*.*.*'
  workflow_dispatch:
    inputs:
      version:
        description: 'Release version (e.g., 1.0.0)'
        required: true
        type: string

permissions:
  contents: write

jobs:
  # ========================================================================
  # BUILD - Windows Electron app on self-hosted runner
  # ========================================================================

  build-windows:
    name: Build Electron App (Windows)
    runs-on: [self-hosted, Windows]

    steps:
      - uses: actions/checkout@v4
        with:
          clean: true
          fetch-depth: 0

      - name: Cleanup processes (pre-build)
        uses: ./.github/actions/cleanup-processes-windows

      - name: Setup Node.js
        uses: actions/setup-node@v6
        with:
          node-version: '20'

      - name: Install dependencies
        shell: PowerShell
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "Installing npm dependencies..." -ForegroundColor Cyan
          npm ci
          if ($LASTEXITCODE -ne 0) {
              Write-Host "ERROR: npm ci failed!" -ForegroundColor Red
              exit $LASTEXITCODE
          }
          Write-Host "Dependencies installed successfully!" -ForegroundColor Green

      - name: Build React app
        shell: PowerShell
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "Building React app..." -ForegroundColor Cyan
          npm run build
          if ($LASTEXITCODE -ne 0) {
              Write-Host "ERROR: React build failed!" -ForegroundColor Red
              exit $LASTEXITCODE
          }
          Write-Host "React app built successfully!" -ForegroundColor Green

      - name: Build Electron app (Windows)
        shell: PowerShell
        run: |
          $ErrorActionPreference = "Stop"

          Write-Host "Building Electron app for Windows..." -ForegroundColor Cyan
          npm run build:electron -- --win
          if ($LASTEXITCODE -ne 0) {
              Write-Host "ERROR: Electron build failed!" -ForegroundColor Red
              exit $LASTEXITCODE
          }
          Write-Host "Electron app built successfully!" -ForegroundColor Green
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}

      - name: Upload Windows artifacts
        uses: actions/upload-artifact@v4
        with:
          name: windows-build
          path: |
            dist/*.exe
            dist/*.msi
          retention-days: 7

      - name: Cleanup processes (post-build)
        if: always()
        uses: ./.github/actions/cleanup-processes-windows

  # ========================================================================
  # RELEASE - Create GitHub Release with Windows artifacts
  # ========================================================================

  create-release:
    name: Create GitHub Release
    needs: build-windows
    runs-on: [self-hosted, Windows]
    if: startsWith(github.ref, 'refs/tags/')

    steps:
      - uses: actions/checkout@v4

      - name: Download Windows artifacts
        uses: actions/download-artifact@v4
        with:
          name: windows-build
          path: release-artifacts

      - name: Verify release artifacts
        shell: PowerShell
        run: |
          Write-Host "Release artifacts:" -ForegroundColor Cyan
          Get-ChildItem -Path "release-artifacts" -Recurse | Format-Table Name, Length

      - name: Create Release
        uses: softprops/action-gh-release@v2
        with:
          files: release-artifacts/**/*
          draft: false
          prerelease: false
          generate_release_notes: true
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
