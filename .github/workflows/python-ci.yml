name: Python CI

on:
  push:
    branches: [main, develop]
    paths:
      - 'lemonade_api/**'
      - '.github/workflows/python-ci.yml'
      - 'pyproject.toml'
  pull_request:
    branches: [main, develop]
    paths:
      - 'lemonade_api/**'
      - '.github/workflows/python-ci.yml'
      - 'pyproject.toml'
  workflow_call:

jobs:
  lint-and-type-check:
    name: Lint & Type Check
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install black ruff mypy pytest pytest-cov pydantic
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f lemonade_api/requirements.txt ]; then pip install -r lemonade_api/requirements.txt; fi

      - name: Run Black formatter check
        run: |
          if [ -d "lemonade_api" ]; then
            black --check lemonade_api/
          else
            echo "lemonade_api directory not found. Skipping Black check."
          fi

      - name: Run Ruff linter
        run: |
          if [ -d "lemonade_api" ]; then
            ruff check lemonade_api/
          else
            echo "lemonade_api directory not found. Skipping Ruff check."
          fi

      - name: Run MyPy type checker
        run: |
          if [ -d "lemonade_api" ]; then
            mypy lemonade_api/ --ignore-missing-imports
          else
            echo "lemonade_api directory not found. Skipping MyPy check."
          fi
        continue-on-error: true  # Don't fail build on type errors initially

  test:
    name: Run Tests
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ['3.9', '3.10', '3.11', '3.12']
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: 'pip'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install pytest pytest-cov pydantic httpx
          if [ -f requirements.txt ]; then pip install -r requirements.txt; fi
          if [ -f lemonade_api/requirements.txt ]; then pip install -r lemonade_api/requirements.txt; fi

      - name: Run pytest with coverage
        run: |
          if [ -d "tests" ] || [ -d "lemonade_api/tests" ]; then
            pytest --cov=lemonade_api --cov-report=xml --cov-report=term-missing
          else
            echo "No tests directory found. Skipping tests."
            echo "Please add tests to improve code quality."
          fi

      - name: Upload coverage to Codecov
        if: matrix.python-version == '3.11'
        uses: codecov/codecov-action@v4
        with:
          file: ./coverage.xml
          flags: python
          name: python-coverage
        continue-on-error: true

  package-check:
    name: Package Build Check
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
          cache: 'pip'

      - name: Install build tools
        run: |
          python -m pip install --upgrade pip
          pip install build twine

      - name: Build package
        run: |
          if [ -f "pyproject.toml" ]; then
            python -m build
            twine check dist/*
          else
            echo "No pyproject.toml found. Skipping package build."
          fi
        continue-on-error: true
